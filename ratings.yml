- name: Setup Ratings Component
  hosts: all
  become: yes
  tasks:
    - name: Create Application User
      ansible.builtin.user:
        name: appuser
        system: yes
        shell: /bin/false
        create_home: no

    - name: Copy SystemD Service file
      ansible.builtin.copy:
        src: ratings.service
        dest: /etc/systemd/system/ratings.service

    - name: Install Python & Pip & MySQL Client
      ansible.builtin.dnf:
        name:
          - python3
          - python3-pip
          - mysql8.4
        state: present

    - name: Remove folder for application
      ansible.builtin.file:
        path: /app
        state: absent

    - name: Create folder for application
      ansible.builtin.file:
        path: /app
        state: directory

    - name: Download Application Content
      ansible.builtin.unarchive:
        src: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/ratings.zip
        dest: /app
        remote_src: yes

    - name: Load Schema
      ansible.builtin.shell: mysql -h mysql-dev.kubek8.online -u root -pRoboShop@1 < db/schema.sql
      args:
        chdir: /app

    - name: Load App User
      ansible.builtin.shell: mysql -h mysql-dev.kubek8.online -u root -pRoboShop@1 < db/app-user.sql
      args:
        chdir: /app

    - name: Install App Dependencies
      ansible.builtin.shell: pip3 install -r requirements.txt cryptography
      args:
        chdir: /app

    - name: Apply permission for application folder
      ansible.builtin.file:
        path: /app
        owner: appuser
        group: appuser
        recurse: yes
        mode: 'o-rwx'

    - name: Start Service
      ansible.builtin.systemd_service:
        name: ratings
        state: restarted
        enabled: yes
        daemon_reload: yes