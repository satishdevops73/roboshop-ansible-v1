- name: Setup Frontend component
  hosts: all
  become: yes
  tasks:
    - name: Install nginx
      ansible.builtin.dnf:
        name: nginx
        state: latest

    - name: Copy the configuration file to destination
      ansible.builtin.copy:
        src: nginx.conf
        dest: /etc/nginx/nginx.conf

#    - name: Setup NodeJS repo
#      ansible.builtin.shell:
#        cmd: curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -

#    - name: Install NodeJS
#      ansible.builtin.dnf:
#        name: nodejs
#        state: present

    - name: Remove app content folder
      ansible.builtin.file:
        path: /tmp/frontend
        state: absent

    - name: Create app content folder
      ansible.builtin.file:
        path: /tmp/frontend
        state: directory

    - name: Download  Frontend component
      ansible.builtin.unarchive:
        src: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/frontend-compiled.zip
        dest: /usr/share/nginx/html
        remote_src: yes

#    - name: Build static code
#      ansible.builtin.shell: npm install ; npm run build ; rm -rf /usr/share/nginx/html/* ; cp -r out/* /usr/share/nginx/html/
#      args:
#        chdir: /tmp/frontend

    - name: Restart service nginx, in all cases
      ansible.builtin.systemd_service:
        name: nginx
        state: restarted
        enabled: yes
